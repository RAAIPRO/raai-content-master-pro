# Контент-мастер PRO v3.3 — конфиг RAAI (dogfooding)
# Версия для внутреннего использования RAAI
# Создан: 2026-04-17, сессия 10 (Р.4)

# ═══════════════════════════════════════════════════
# ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
# ═══════════════════════════════════════════════════

leader:
  role: "Директор / Владелец"
  content_experience: "опытный"
  team_size: 1
  writes_content_personally: true
  hour_cost_rub: 5000
  hours_per_week_on_content: 10
  main_pain: "контент не выходит системно, нет ритма и автоматизации"
  current_tools:
    - "Claude Code (ПК)"
    - "OpenClaw (VPS)"
    - "n8n"
    - "Telegram"
  style: "системный"

# ═══════════════════════════════════════════════════
# КОМПАНИЯ
# ═══════════════════════════════════════════════════

company:
  name: "RAAI"
  industry: "AI-автоматизация бизнеса"
  model: "B2B"
  avg_deal_size: 30000
  revenue_monthly: 0                         # цель 1 000 000 — сейчас 0, запуск
  website: "raaipro.com"
  content_budget_monthly: 10000

# ═══════════════════════════════════════════════════
# БИЗНЕС
# ═══════════════════════════════════════════════════

business:
  name: "ООО RAAI"
  product: "AI-коробки (цифровые сотрудники): Контент-мастер, AI-Лиды, AI-Аналитик и др."
  niche: "AI-автоматизация"
  price_min: 30000
  price_avg: 30000
  price_max: 90000
  currency: "RUB"
  geo: "Россия, Москва и область"
  usp: "Заменяем одного сотрудника за 30 000 руб/мес вместо 80 000–150 000"
  brand_promise: "Система работает пока ты спишь — без найма, без хаоса"

# ═══════════════════════════════════════════════════
# ЦЕЛЕВАЯ АУДИТОРИЯ
# ═══════════════════════════════════════════════════

target:
  avatar: "собственники малого и среднего бизнеса, директора, предприниматели 30-50 лет"
  age_range: "30-50"
  gender: "все"
  income: "от 150 000 руб/мес (личный или бизнес)"
  decision_maker: "Собственник / Генеральный директор"
  pain_primary: "нет системы — всё держится на людях и ручном труде"
  pain_secondary: "найм дорогой и ненадёжный, задачи тонут"
  objection_main: "AI не заменит сотрудника / это сложно / мы уже пробовали ChatGPT"
  trigger: "уволился сотрудник / выросла нагрузка / провалился запуск / нет лидов"
  trigger_words:
    - "некому делать"
    - "не успеваем"
    - "слишком дорого нанимать"
    - "автоматизация"
    - "убрать рутину"
    - "масштабироваться без найма"

# ═══════════════════════════════════════════════════
# ПЛОЩАДКИ И КАНАЛЫ
# ═══════════════════════════════════════════════════

channels:
  telegram:
    enabled: true
    channel_link: "@AI_2chat"
    post_length: "medium"
    posts_per_week: 5
    target_er: 8
    target_subscribers_growth: 100
    kpi: "ER ≥6%, охват поста ≥25% базы"
  telegram_stroy:
    enabled: true
    channel_link: "@StroikaRossii"
    post_length: "short"
    posts_per_week: 3
    target_er: 5
    kpi: "ER ≥4%, охват ≥20% базы"
  instagram:
    enabled: false
  email:
    enabled: false
  youtube:
    enabled: false

# ═══════════════════════════════════════════════════
# TONE OF VOICE (RAAI)
# ═══════════════════════════════════════════════════

tone_of_voice:
  style: "деловая прямая"
  adjectives:
    - "жёсткий"
    - "аналитический"
    - "конкретный"
  addressing: "вы"                          # RAAI всегда на Вы
  emoji_level: "нет"
  cta_style: "прямой"
  forbidden_words:
    - "революционный"
    - "уникальный"
    - "инновационный"
    - "в современном мире"
    - "не секрет что"
    - "все мы знаем"
    - "осуществлять"
    - "в рамках"
    - "является"
    - "комплексный подход"
    - "широкий спектр услуг"
    - "безусловно"
    - "конечно"
    - "разумеется"
    - "мы рады"
    - "команда профессионалов"
  allowed_words:
    - "RAAI"
    - "цифровой сотрудник"
    - "коробка"
    - "деньги / время / нервы"
    - "заменяет"
    - "работает пока спишь"
    - "без найма"

# ═══════════════════════════════════════════════════
# КОНТЕНТ-СТРАТЕГИЯ
# ═══════════════════════════════════════════════════

content_strategy:
  content_mix:
    educational: 35                         # разборы, кейсы, как работают AI-коробки
    selling: 25                             # офферы, ROI-расчёты, сравнение найм vs коробка
    engaging: 25                            # вопросы, провокации, опросы про AI
    personal: 15                            # закулисье RAAI, как мы используем сами
  posting_frequency: 5
  best_time_post: "09:00-10:00 и 18:00-19:00"
  content_pillars:
    - "AI заменяет сотрудника: кейсы и расчёты"
    - "Как RAAI работает внутри (dogfooding)"
    - "Автоматизация без найма: практика"
    - "Стройка + AI (канал StroikaRossii)"
    - "Бизнес-решения через три фильтра: деньги/время/нервы"

# ═══════════════════════════════════════════════════
# СИСТЕМНЫЙ ПРОМПТ — RAAI PERSONA (из RAAI_PERSONA_TEMPLATE.md)
# ═══════════════════════════════════════════════════

persona:
  base_template: "memory/RAAI_PERSONA_TEMPLATE.md"
  role: "Контент-мастер PRO — система контент-маркетинга RAAI"
  task: "Разработка контент-стратегии, планов, TOV, постов и аналитики"
  tool: "config_raai.yaml + база примеров"
  context: "AI-автоматизация, B2B, Москва, коробки 30К"
  extra_rules:
    - "Перед стратегией уточнить: для какого канала, какая цель"
    - "TOV = жёсткий / аналитический / конкретный — не менять"
    - "В постах: конкретный тезис + пруф (цифра/кейс) + CTA"
    - "Контент-план = конкретные темы с форматом и метрикой, не 'примерные идеи'"
    - "Всегда указывать канал (AI_2chat или StroikaRossii)"

# ═══════════════════════════════════════════════════
# ROI-МОДЕЛЬ RAAI
# ═══════════════════════════════════════════════════

roi_model:
  formula: "сэкономленные часы × стоимость часа + доп. лиды × средний чек × конверсия"
  example:
    product_cost: 30000
    hours_saved_per_week: 8
    hour_cost: 5000
    weekly_savings: 40000
    monthly_savings: 160000
    payback_days: 6
    additional_leads_monthly: 5
    lead_to_client_rate: 0.20
    avg_deal: 30000
    additional_revenue: 30000
    total_monthly_return: 190000
    annual_roi_percent: 7500

# ═══════════════════════════════════════════════════
# ВЕРСИЯ
